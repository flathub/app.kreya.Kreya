app-id: app.kreya.Kreya
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: kreya
copy-icon: true
separate-locales: false
finish-args:
  - --share=network
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
modules:
  - name: kreya
    buildsystem: simple
    build-commands:
      - cp -a kreya/* /app/
    sources:
      - type: archive
        only-arches:
          - x86_64
        url: https://stable-downloads.kreya.app/1.20.2/Kreya-app-linux-x64.tar.gz
        sha256: 2ce8c347d9746b76ca21eee9c3621fcc54be1451200a5b521d470a773de14892
        dest: kreya
        x-checker-data:
          type: html
          url: https://stable-downloads.kreya.app/latest/version.txt
          version-pattern: ([\d]+\.[\d]+\.[\d]+)
          url-template: https://stable-downloads.kreya.app/$version/Kreya-app-linux-x64.tar.gz
          is-main-source: true
      - type: archive
        only-arches:
          - aarch64
        url: https://stable-downloads.kreya.app/1.20.2/Kreya-app-linux-arm64.tar.gz
        sha256: 7864441a7c1aa9bd1c7adf29a191d8cebc028d147f677a21788f834d2a8c7a25
        dest: kreya
        x-checker-data:
          type: html
          url: https://stable-downloads.kreya.app/latest/version.txt
          version-pattern: ([\d]+\.[\d]+\.[\d]+)
          url-template: https://stable-downloads.kreya.app/$version/Kreya-app-linux-arm64.tar.gz
